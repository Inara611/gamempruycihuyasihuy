<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Kucing 🐱</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #800000;
      color: white;
    }

    .btn-cat {
      background-color: #ffb6c1;
      border: none;
    }

    .btn-cat:hover {
      background-color: #ffc0cb;
    }

    .cat {
      width: 150px;
      margin-top: 20px;
      transition: 0.5s;
    }
  </style>
</head>

<body>

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">🐱 Inara Game</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <div>
        <a href="index.html" class="btn btn-outline-light me-2">Home</a>
        <a href="profile.html" class="btn btn-outline-light me-2">Profile</a>
        <a href="game.html" class="btn btn-outline-light me-2">Game</a>
        <a href="contact.html" class="btn btn-outline-light">Contact</a>
      </div>
    </div>
  </div>
</nav>

<!-- GAME -->
<div class="container text-center mt-5">
  <h2>🎮 Tebak Angka Kucing 🐱</h2>
  <p>Tebak angka 1 - 10 biar si kucing senang 😺</p>

  <input type="number" id="guess" class="form-control w-25 mx-auto" min="1" max="10">

  <button onclick="checkGuess()" class="btn btn-cat mt-3">Tebak 🐾</button>
  <button onclick="resetGame()" class="btn btn-light mt-3 ms-2">Reset 🔄</button>

  <p id="result" class="mt-3"></p>

  <!-- ✅ GAMBAR FIX -->
  <img id="catImg" class="cat"
    src="https://cdn2.thecatapi.com/images/MTY3ODIyMQ.jpg"
    alt="kucing">
</div>

<script>
let number = Math.floor(Math.random() * 10) + 1;

function checkGuess() {
  let guess = document.getElementById("guess").value;
  let cat = document.getElementById("catImg");

  if (guess == number) {
    document.getElementById("result").innerHTML = "😺 Benar!";
    cat.src = "https://cdn2.thecatapi.com/images/MTY3ODIyMQ.jpg";
  } else {
    document.getElementById("result").innerHTML = "🙀 Salah!";
    cat.src = "https://cdn2.thecatapi.com/images/9j5.jpg";
  }
}

function resetGame() {
  number = Math.floor(Math.random() * 10) + 1;
  document.getElementById("result").innerHTML = "Reset! 😺";
  document.getElementById("guess").value = "";

  document.getElementById("catImg").src =
    "https://cdn2.thecatapi.com/images/MTY3ODIyMQ.jpg";
}
</script>

<!-- ✅ WAJIB BIAR BURGER MENU HIDUP -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
